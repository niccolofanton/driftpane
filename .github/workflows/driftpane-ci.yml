name: driftpane-ci

on:
  pull_request:
    paths:
      - 'driftpane/**'
      - '.github/workflows/driftpane-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'driftpane/**'
      - '.github/workflows/driftpane-ci.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: driftpane
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: driftpane/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run format:check

      - run: npm run test:coverage

      - run: npm run build

      - run: npm pack --dry-run

      - name: publint
        run: npx --yes publint
        continue-on-error: true

      - name: Are the types wrong?
        run: npx --yes @arethetypeswrong/cli@latest --pack
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node }}
          path: driftpane/coverage
          if-no-files-found: ignore
